{% set version = "3.1.0" %}

package:
  name: django-jquery
  version: {{ version }}

source:
  fn: django-jquery-{{ version }}.tar.gz
  url: https://pypi.org/packages/source/d/django-jquery/django-jquery-{{ version }}.tar.gz
  sha256: 414ac1083708ac71cc771612e7287702c939d06cd357fd53bb1271a4f6255115

build:
  noarch: python
  number: 2
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
    - django >=1.3
  run:
    - python >={{ python_min }}
    - django >=1.3

test:
  requires:
    - python {{ python_min }}
  imports:
    - jquery

about:
  home: http://bitbucket.org/massimilianoravelli/django-jquery
  license: MIT
  license_file: '{{ environ["RECIPE_DIR"] }}/LICENSE'
  summary: 'jQuery packaged in an handy django app to speed up new applications and deployment.'

extra:
  recipe-maintainers:
    - ocefpaf
